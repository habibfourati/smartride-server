<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Réinitialisation mot de passe - SmartRide AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #0f1923; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #1a2535; border-radius: 16px; padding: 48px 40px; max-width: 420px; width: 90%; }
  h1 { color: #4CAF50; font-size: 24px; margin-bottom: 8px; }
  p { color: #90a4ae; margin-bottom: 28px; font-size: 14px; }
  label { display: block; color: #cfd8dc; font-size: 13px; margin-bottom: 6px; }
  input { width: 100%; background: #0f1923; border: 1px solid #2a3a4a; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 15px; margin-bottom: 20px; outline: none; }
  input:focus { border-color: #4CAF50; }
  button { width: 100%; background: #4CAF50; color: #000; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
  button:hover { background: #43a047; }
  .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
  .msg.success { background: #1b5e20; color: #a5d6a7; display: block; }
  .msg.error { background: #b71c1c; color: #ef9a9a; display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>Nouveau mot de passe</h1>
  <p>Entrez votre nouveau mot de passe ci-dessous.</p>
  <label>Nouveau mot de passe</label>
  <input type="password" id="password" placeholder="Minimum 6 caractères">
  <label>Confirmer le mot de passe</label>
  <input type="password" id="confirm" placeholder="Répéter le mot de passe">
  <button onclick="resetPassword()">Enregistrer</button>
  <div class="msg" id="msg"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const msg = document.getElementById('msg');
    msg.className = 'msg';

    if (!token) { msg.className = 'msg error'; msg.textContent = 'Lien invalide.'; return; }
    if (password.length < 6) { msg.className = 'msg error'; msg.textContent = 'Mot de passe trop court (min 6 caractères).'; return; }
    if (password !== confirm) { msg.className = 'msg error'; msg.textContent = 'Les mots de passe ne correspondent pas.'; return; }

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'msg success';
        msg.textContent = 'Mot de passe mis à jour ! Vous pouvez vous reconnecter dans l\'application.';
      } else {
        msg.className = 'msg error';
        msg.textContent = data.error || 'Erreur.';
      }
    } catch {
      msg.className = 'msg error';
      msg.textContent = 'Impossible de contacter le serveur.';
    }
  }
</script>
</body>
</html>
