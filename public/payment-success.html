<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paiement réussi - SmartRide AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #0f1923; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #1a2535; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; }
  .icon { font-size: 64px; margin-bottom: 24px; }
  h1 { color: #4CAF50; font-size: 28px; margin-bottom: 12px; }
  p { color: #90a4ae; line-height: 1.6; margin-bottom: 24px; }
  .badge { display: inline-block; background: #4CAF50; color: #000; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 24px; }
  .steps { background: #0f1923; border-radius: 12px; padding: 20px; text-align: left; }
  .step { display: flex; align-items: center; gap: 12px; padding: 8px 0; color: #cfd8dc; }
  .step-num { background: #4CAF50; color: #000; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Paiement réussi !</h1>
  <div class="badge">Premium activé</div>
  <p>Votre compte SmartRide AI est maintenant Premium. Merci pour votre confiance !</p>
  <div class="steps">
    <div class="step"><div class="step-num">1</div> Ouvrez l'application SmartRide AI</div>
    <div class="step"><div class="step-num">2</div> Connectez-vous avec votre email</div>
    <div class="step"><div class="step-num">3</div> Profitez de toutes les fonctionnalités Premium</div>
  </div>
</div>
</body>
</html>
